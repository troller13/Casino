<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c8f135" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="BETZONE" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="description" content="Pariuri sportive și casino live" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BETZONE — Pariuri Live</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #root {
        min-height: 100%;
      }
      body {
        background: #06080c;
        color: #f0f4ff;
        overflow-x: hidden;
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 8px #c8f135;
        }
        50% {
          opacity: 0.5;
          box-shadow: 0 0 20px #c8f135;
        }
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-24px) scale(1.04);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.88) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes tickerScroll {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -600px 0;
        }
        100% {
          background-position: 600px 0;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Light mode overrides ─────────────────────────────────────── */
      [data-theme="light"] body {
        background: #f0f2f8 !important;
        color: #0d1117 !important;
      }
      [data-theme="light"] header {
        background: rgba(240, 242, 248, 0.95) !important;
        border-bottom-color: rgba(0, 0, 0, 0.08) !important;
      }
      [data-theme="light"] .ticker-wrap,
      [data-theme="light"] [style*="background: #0d1017"],
      [data-theme="light"] [style*="background: #080a0f"],
      [data-theme="light"] [style*="background: #0a0c14"],
      [data-theme="light"] [style*="background: #0a0e18"] {
        background: #ffffff !important;
      }
      [data-theme="light"] [style*="background: #111520"],
      [data-theme="light"] [style*="background: #161b2e"] {
        background: #f7f8fc !important;
      }
      [data-theme="light"] [style*="color: #f0f4ff"],
      [data-theme="light"] [style*="color: #f0f4ff"] {
        color: #0d1117 !important;
      }
      [data-theme="light"] [style*="color: #8892a4"] {
        color: #4a5568 !important;
      }
      [data-theme="light"] [style*="color: #3d4660"] {
        color: #94a3b8 !important;
      }
      [data-theme="light"] [style*="border: 1px solid rgba(255,255,255,0.06)"],
      [data-theme="light"] [style*="border-color: rgba(255,255,255"] {
        border-color: rgba(0, 0, 0, 0.08) !important;
      }
      [data-theme="light"] [style*="background: #06080c"] {
        background: #f0f2f8 !important;
      }
      [data-theme="light"] [style*="background: #08"] {
        background: #ffffff !important;
      }
      /* Keep accent colors in light mode */
      [data-theme="light"] [style*="color: #c8f135"] {
        color: #3a7d00 !important;
      }
      [data-theme="light"]
        [style*="background: linear-gradient(135deg, #c8f135"] {
        background: linear-gradient(135deg, #3a7d00, #2d6600) !important;
        color: #ffffff !important;
      }
      /* Orb backgrounds hide in light mode */
      [data-theme="light"] .orb {
        display: none;
      }
      /* Input backgrounds */
      [data-theme="light"] input,
      [data-theme="light"] textarea {
        background: #ffffff !important;
        color: #0d1117 !important;
        border-color: rgba(0, 0, 0, 0.12) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => {
              console.log("[SW] Registered:", reg.scope);
            })
            .catch((err) => console.warn("[SW] Failed:", err));
        });
      }
    </script>
  </body>
</html>
